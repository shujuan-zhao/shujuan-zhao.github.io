title: "Shujuan Zhao"
author: "Shujuan Zhao"
description: "Washington University in St.Louis"
url: "https://shujuan-zhao.github.io"
baseurl: ""
permalink: /:title/
paginate: 10
lang: "en"
excerpt_separator: "\n\n\n"
date_format: "%B %d, %Y"

# Layout
name: Shujuan Zhao
photo: /images/shujuan-6.jpg  # Make sure this matches your image path

show_excerpts: false        # show article excerpts on the home page
show_frame: true           # adds a gray frame to the site
show_sidebar: true        # show a sidebar instead of the usual header
minimal: false             # use a dark header

# Menu

navigation:                # accepts {file, title, url, icon, sidebaricon}
  #- {title: "About", url: "/about/"}
  #- {title: "CV", url: "/cv/"}
  #- {title: "Publications", url: "/publications/"}
  - {title: "Blog", url: "/blog/"}
  - {title: "Contact", url: "/contact/"}

external:                  # shows a footer with social links - for available icons see fontawesome.com/icons
  - {title: Mail, icon: envelope, url: "mailto:shujuanzzzz@gmail.com"}
  - {title: Google Scholar, icon: graduation-cap, url: "https://scholar.google.com/citations?user=nLsNVrsAAAAJ"}
  - {title: ResearchGate, icon: researchgate, url: "https://www.researchgate.net/profile/Shujuan-Zhao-4"}
  - {title: ORCID, icon: orcid, url: "https://orcid.org/0000-0003-0248-0119"}
  - {title: Github, icon: github, url: "https://github.com/shujuan-zhao"}
  - {title: Twitter, icon: twitter, url: "https://twitter.com/shujuan_zhao"}
  - {title: LinkedIn, icon: linkedin, url: "https://www.linkedin.com/in/shujuan-zhao/"}

comments:
#  disqus_shortname: ""    # see https://disqus.com/
#  isso_domain: ""         # see https://posativ.org/isso/

plugins:
 - jekyll-feed

# Jekyll Compose defaults
jekyll_compose:
  default_front_matter:
    posts:
      layout: post
      author: Shujuan Zhao
      categories: research
      mathjax: false
    pages:
      layout: page

# Collections (for better organization)
collections_dir: .
collections:
  pages:
    output: true
    permalink: /:name/

# Exclude files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CONTRIBUTING.md
  - PROJECT_README.md
  - CLAUDE.md
  - docs/
  - vendor/
  - .bundle/
  - .editorconfig
  - .ruby-version
  - .git/
  - .gitignore
  - "*.backup"
  - "*.bak"
